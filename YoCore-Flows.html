<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YoCore — Visual Flow Diagrams</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#e6edf3;font-size:14px;line-height:1.5}
.app{display:flex;height:100vh;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{width:268px;min-width:268px;background:#161b22;border-right:1px solid #30363d;height:100vh;overflow-y:auto;display:flex;flex-direction:column;flex-shrink:0}
.sidebar::-webkit-scrollbar{width:4px}.sidebar::-webkit-scrollbar-track{background:transparent}.sidebar::-webkit-scrollbar-thumb{background:#30363d;border-radius:4px}
.sidebar-brand{padding:20px 20px 18px;border-bottom:1px solid #30363d}
.brand-logo{font-size:22px;font-weight:800;background:linear-gradient(135deg,#58a6ff,#bc8cff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-0.5px}
.brand-sub{font-size:11px;color:#484f58;margin-top:3px;letter-spacing:0.3px}
.sidebar-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:#484f58;padding:16px 20px 8px}
.flow-link{display:flex;align-items:flex-start;gap:11px;padding:9px 16px;cursor:pointer;border-left:3px solid transparent;transition:background .15s,border-color .15s;user-select:none}
.flow-link:hover{background:rgba(255,255,255,.03)}
.flow-link.active{border-left-color:#58a6ff;background:rgba(88,166,255,.06)}
.flow-num-badge{width:24px;height:24px;border-radius:7px;background:#21262d;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#8b949e;flex-shrink:0;margin-top:1px}
.flow-link.active .flow-num-badge{background:#1c3466;color:#58a6ff}
.fl-text{flex:1;min-width:0}
.fl-title{font-size:13px;font-weight:500;color:#c9d1d9;line-height:1.35}
.flow-link.active .fl-title{color:#58a6ff}
.fl-sub{font-size:11px;color:#484f58;margin-top:2px}
.sidebar-legend{padding:16px 20px;border-top:1px solid #30363d;margin-top:auto}
.legend-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#484f58;margin-bottom:10px}
.legend-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.legend-label{font-size:11px;color:#8b949e}

/* ── MAIN ── */
.main{flex:1;height:100vh;overflow-y:auto;min-width:0}
.main::-webkit-scrollbar{width:6px}.main::-webkit-scrollbar-track{background:transparent}.main::-webkit-scrollbar-thumb{background:#30363d;border-radius:4px}
.flow-page{display:none;padding:40px 44px 60px;max-width:960px}
.flow-page.active{display:block}

/* ── FLOW HEADER ── */
.flow-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#484f58;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.flow-title{font-size:28px;font-weight:800;color:#e6edf3;letter-spacing:-0.5px;margin-bottom:12px;line-height:1.2}
.flow-desc{font-size:13.5px;color:#8b949e;line-height:1.75;max-width:680px;padding:14px 18px;background:#161b22;border-left:3px solid #21262d;border-radius:0 10px 10px 0;margin-bottom:28px}

/* ── ACTORS ROW ── */
.actors-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:32px}
.actor-pill{display:flex;align-items:center;gap:7px;padding:5px 13px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid}

/* ── STEPS ── */
.steps-wrap{position:relative;max-width:760px}
.step{display:flex;gap:0;position:relative}
.step-gutter{width:46px;display:flex;flex-direction:column;align-items:center;flex-shrink:0}
.step-circle{width:38px;height:38px;border-radius:50%;border:2px solid;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;background:#0d1117;flex-shrink:0;z-index:1}
.step-line{width:2px;background:#21262d;flex:1;min-height:20px}
.step-body{flex:1;padding:0 0 26px 16px;min-width:0}
.step-card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:16px 20px;transition:border-color .2s,box-shadow .2s}
.step-card:hover{border-color:#484f58;box-shadow:0 4px 24px rgba(0,0,0,.3)}
.step-actor{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.step-action{font-size:15px;font-weight:700;color:#e6edf3;margin-bottom:7px}
.step-detail{font-size:13px;color:#8b949e;line-height:1.65;margin-bottom:12px}
.step-payload{background:#0a0d12;border:1px solid #21262d;border-radius:8px;padding:12px 14px;font-family:'SF Mono','Fira Code','Courier New',monospace;font-size:12px;color:#79c0ff;margin-bottom:12px;overflow-x:auto;white-space:pre;line-height:1.6}
.db-impact{margin-top:12px;padding-top:12px;border-top:1px solid #21262d}
.db-impact-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#484f58;margin-bottom:8px}
.db-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.db-coll{font-family:'SF Mono','Courier New',monospace;font-size:12px;font-weight:600;padding:3px 9px;border-radius:6px;background:#1c2128;border:1px solid #30363d;color:#c9d1d9}
.op{font-size:10px;font-weight:800;padding:2px 7px;border-radius:4px;letter-spacing:.5px}
.op-insert{background:#0e2a1d;color:#3fb950}
.op-update{background:#271c06;color:#f0883e}
.op-delete{background:#270b0b;color:#f85149}
.op-read{background:#0c1c32;color:#58a6ff}
.db-fields{font-size:11px;color:#8b949e;font-family:monospace;font-style:italic}

/* ── DB SUMMARY ── */
.db-summary{margin-top:44px;padding-top:36px;border-top:1px solid #30363d;max-width:760px}
.db-summary-title{font-size:16px;font-weight:700;color:#e6edf3;margin-bottom:18px;display:flex;align-items:center;gap:9px}
.db-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:10px}
.db-card{background:#161b22;border:1px solid #21262d;border-radius:10px;padding:13px 14px}
.db-card.hit{border-color:#238636;background:#0a1f0d}
.db-card-name{font-size:13px;font-weight:700;font-family:monospace;margin-bottom:7px;display:flex;align-items:center;gap:7px}
.status-dot{width:7px;height:7px;border-radius:50%;background:#21262d;flex-shrink:0}
.db-card.hit .status-dot{background:#3fb950}
.db-card-ops{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px}
.db-card-note{font-size:11px;color:#484f58;font-family:monospace;line-height:1.5}
.db-card.hit .db-card-note{color:#7d8590}

/* ── SCROLLTOP BUTTON ── */
.totop{position:fixed;bottom:28px;right:28px;width:40px;height:40px;border-radius:50%;background:#21262d;border:1px solid #30363d;color:#8b949e;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;z-index:100}
.totop:hover{background:#30363d;color:#e6edf3}

/* ── SPECIAL TAGS ── */
.warning-step .step-card{border-left-color:#f0883e!important;background:#1a1208}
.danger-step .step-card{border-left-color:#f85149!important;background:#1a0808}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-logo">YoCore</div>
      <div class="brand-sub">Visual Flow Diagrams · v1.5</div>
    </div>
    <div class="sidebar-label">Core Flows</div>
    <div id="sidebar-nav"></div>
    <div class="sidebar-legend">
      <div class="legend-title">Actor Legend</div>
      <div id="legend-rows"></div>
    </div>
  </aside>
  <main class="main" id="main">
    <div id="flow-container"></div>
  </main>
</div>
<button class="totop" onclick="document.getElementById('main').scrollTop=0" title="Back to top">↑</button>

<script>
// ═══════════════════════════════════════════════
//  ACTORS
// ═══════════════════════════════════════════════
const ACTORS = {
  'super-admin':  { label:'Super Admin (You)',  color:'#c084fc', bg:'rgba(192,132,252,.09)', border:'rgba(192,132,252,.3)' },
  'browser':      { label:'Browser / End User', color:'#22d3ee', bg:'rgba(34,211,238,.09)',  border:'rgba(34,211,238,.3)'  },
  'product-app':  { label:'Yo Product (YoPM)',  color:'#34d399', bg:'rgba(52,211,153,.09)', border:'rgba(52,211,153,.3)'  },
  'yocore-api':   { label:'YoCore API',         color:'#60a5fa', bg:'rgba(96,165,250,.09)', border:'rgba(96,165,250,.3)'  },
  'mongodb':      { label:'MongoDB',            color:'#4ade80', bg:'rgba(74,222,128,.09)', border:'rgba(74,222,128,.3)'  },
  'redis':        { label:'Redis',              color:'#f87171', bg:'rgba(248,113,113,.09)',border:'rgba(248,113,113,.3)' },
  'stripe':       { label:'Stripe',             color:'#a78bfa', bg:'rgba(167,139,250,.09)',border:'rgba(167,139,250,.3)' },
  'sslcommerz':   { label:'SSLCommerz',          color:'#f97316', bg:'rgba(249,115,22,.09)',  border:'rgba(249,115,22,.3)'  },
  'email':        { label:'Email (Resend)',      color:'#fbbf24', bg:'rgba(251,191,36,.09)', border:'rgba(251,191,36,.3)'  },
};
const ACTOR_COLOR = a => ACTORS[a]?.color || '#58a6ff';

// ═══════════════════════════════════════════════
//  ALL MONGO COLLECTIONS
// ═══════════════════════════════════════════════
const ALL_COLLECTIONS = [
  'users','sessions','authTokens','products','productUsers',
  'workspaces','workspaceMembers','roles','billingPlans',
  'subscriptions','invitations','webhookDeliveries','auditLogs','bundles',
  'paymentGateways'
];

// ═══════════════════════════════════════════════
//  FLOW DATA
// ═══════════════════════════════════════════════
const flows = [

// ─────────────────────────────────────────────
// FLOW 01 — SUPER ADMIN LOGIN
// ─────────────────────────────────────────────
{
  id:'f01', num:'01',
  title:'Super Admin YoCore-এ Login করে',
  subtitle:'Dashboard access',
  desc:'তুমি (Super Admin) প্রথমবার তোমার private YoCore dashboard URL-এ login করছো। YoCore credentials verify করে একটা JWT issue করে এবং session MongoDB-তে save করে।',
  actors:['super-admin','yocore-api','mongodb'],
  steps:[
    {
      actor:'super-admin',
      action:'YoCore Dashboard URL খোলো, email + password দাও',
      detail:'তুমি তোমার private YoCore admin URL-এ navigate করো এবং Super Admin credentials enter করো।',
      payload:null, db:[]
    },
    {
      actor:'yocore-api',
      action:'POST /v1/auth/signin — Credentials validate করো',
      detail:'YoCore users collection-এ email দিয়ে search করে। Argon2id দিয়ে password hash verify করে। Role = SUPER_ADMIN কিনা check করে।',
      payload:'POST /v1/auth/signin\nHeaders: X-Internal-Key: yc_admin\n{\n  "email": "you@yocore.io",\n  "password": "••••••••"\n}',
      db:[
        {c:'users',   op:'read',   f:'email দিয়ে user খোঁজো, passwordHash + role নাও'},
        {c:'users',   op:'update', f:'lastLoginAt ← now, failedAttempts ← 0'},
        {c:'sessions',op:'insert', f:'userId, jti, refreshTokenHash, ip, userAgent, expiresAt (+30d admin)'}
      ]
    },
    {
      actor:'yocore-api',
      action:'JWT (15min) + Refresh Token (30 days) issue করো',
      detail:'Access token payload: { sub: userId, role: "SUPER_ADMIN" }. Refresh token httpOnly Secure cookie হিসেবে set হয়। Client কখনো raw refresh token দেখে না।',
      payload:'Response 200:\n{\n  "access_token": "eyJhbGci...", // 15 min expiry\n  "user": {\n    "id": "usr_sa_001",\n    "name": "You",\n    "role": "SUPER_ADMIN"\n  }\n}\nSet-Cookie: refresh_token=...; HttpOnly; Secure; SameSite=Strict',
      db:[]
    },
    {
      actor:'super-admin',
      action:'YoCore Dashboard Home দেখতে পাও',
      detail:'Dashboard load হয়: সব registered products-এর cards, total MRR, active users। প্রথমবার হলে empty state দেখাবে।',
      payload:null, db:[]
    }
  ],
  dbHit:{
    'users':    {ops:['read','update'], note:'Login verify, lastLoginAt + failedAttempts reset'},
    'sessions': {ops:['insert'],        note:'নতুন admin session record তৈরি'}
  }
},

// ─────────────────────────────────────────────
// FLOW 02 — REGISTER PRODUCT
// ─────────────────────────────────────────────
{
  id:'f02', num:'02',
  title:'নতুন Product Register করো (YoPM)',
  subtitle:'Product Registry',
  desc:'তুমি YoCore dashboard থেকে YoPM-কে register করছো। YoCore API Key + Secret generate করে। এই credentials YoPM-এর .env-এ রাখলে YoPM YoCore-এর সাথে কথা বলতে পারবে।',
  actors:['super-admin','yocore-api','mongodb'],
  steps:[
    {
      actor:'super-admin',
      action:'Dashboard → Products → "Register New Product" click করো',
      detail:'Product registration form খোলে। Name, Slug, Domain, Logo URL, Description, Billing Scope fill করো।',
      payload:null, db:[]
    },
    {
      actor:'super-admin',
      action:'Form fill করো এবং Submit করো',
      detail:'Slug auto-generate হয় name থেকে (lowercase, hyphenated)। Domain হলো তোমার product-এর base URL। Billing Scope: workspace (B2B) বা user (individual)।',
      payload:'{\n  "name": "YoPM",\n  "slug": "yopm",\n  "domain": "yopm.io",\n  "description": "Project Management Tool",\n  "billingScope": "workspace"\n}',
      db:[]
    },
    {
      actor:'yocore-api',
      action:'Slug uniqueness check করো, Product record তৈরি করো',
      detail:'Slug already exists কিনা check করে। তারপর product document create করে। Default roles তৈরি হয়: OWNER, ADMIN, MEMBER, VIEWER।',
      payload:null,
      db:[
        {c:'products', op:'insert', f:'name, slug, domain, status: INACTIVE, billingScope, createdAt'},
        {c:'roles',    op:'insert', f:'4টা default role: OWNER, ADMIN, MEMBER, VIEWER (productId-scoped)'}
      ]
    },
    {
      actor:'yocore-api',
      action:'API Key + Secret generate করো (⚠️ Secret শুধু একবারই দেখাবে)',
      detail:'API Key (prefix: yc_live_) random generate হয়। Secret আলাদাভাবে generate হয়। Secret-এর Argon2id hash শুধু DB-তে store হয় — plain text কোথাও থাকে না।',
      payload:'// Generated credentials (show once modal):\n{\n  "api_key": "yc_live_a7b3c9d2e1f4...",\n  "api_secret": "ycs_x9y2z8w1v4u7..."\n  // ⚠️ api_secret copy করো এখনই!\n  // YoCore শুধু hash রাখে — পরে দেখানো যাবে না!\n}',
      db:[
        {c:'products', op:'update', f:'apiKey (plain, for header matching), apiSecretHash (Argon2id hash)'}
      ]
    },
    {
      actor:'super-admin',
      action:'YoPM .env-এ credentials add করো',
      detail:'Copied credentials YoPM-এর environment variable-এ রাখো। এখন থেকে YoPM YoCore-কে call করতে পারবে।',
      payload:'# YoPM — .env file\nYOCORE_API_KEY=yc_live_a7b3c9d2e1f4\nYOCORE_API_SECRET=ycs_x9y2z8w1v4u7\nYOCORE_BASE_URL=https://api.yocore.io',
      db:[]
    },
    {
      actor:'super-admin',
      action:'Product ACTIVE করো (Dashboard-এ)',
      detail:'Settings-এ গিয়ে product status INACTIVE → ACTIVE করো। এখন product dashboard-এ দেখা যাবে এবং users sign up করতে পারবে।',
      payload:null,
      db:[
        {c:'products', op:'update', f:'status ← ACTIVE'}
      ]
    }
  ],
  dbHit:{
    'products': {ops:['insert','update'], note:'নতুন product doc, API credentials hash, status ACTIVE'},
    'roles':    {ops:['insert'],          note:'Default roles: OWNER, ADMIN, MEMBER, VIEWER'}
  }
},

// ─────────────────────────────────────────────
// FLOW 02B — PAYMENT GATEWAY SETUP
// ─────────────────────────────────────────────
{
  id:'f02b', num:'2B',
  title:'Payment Gateway Setup — Stripe + SSLCommerz',
  subtitle:'Product config — Billing gateways',
  desc:'Product register করার পরে Super Admin payment gateway configure করে। YoPM হয়তো শুধু Stripe নেবে (international users), YoSuite নেবে Stripe + SSLCommerz (BD users)। Gateway credentials encrypted হয়ে <code style="background:#1c2128;padding:1px 5px;border-radius:4px;font-family:monospace;font-size:12px">paymentGateways</code> collection-এ থাকে — plain text কখনো store হয় না। তারপরে SSLCommerz-এর জন্য recurring কীভাবে কাজ করে সেটাও দেখানো হয়েছে।',
  actors:['super-admin','yocore-api','mongodb','stripe','sslcommerz'],
  steps:[
    {
      actor:'super-admin',
      action:'Dashboard → YoPM → Settings → Billing → Gateways → "Add Gateway"',
      detail:'Product-এ কোন কোন payment gateway active থাকবে সেটা এখান থেকে configure করা হয়। প্রতিটা product আলাদা gateway configuration রাখতে পারে।',
      payload:null, db:[]
    },
    {
      actor:'super-admin',
      action:'Stripe gateway add করো — API credentials enter করো',
      detail:'Stripe Dashboard থেকে Secret Key কপি করো। YoCore শুধু server-side secret key store করে — publishable key optional (frontend embed-এর জন্য)। Secret AES-256 দিয়ে encrypt হয়ে store হয়।',
      payload:'{\n  "provider": "stripe",\n  "product_id": "prod_yopm_objectid",\n  "config": {\n    "secret_key": "sk_live_xxxxx",     // ← AES-256 encrypted before storage\n    "publishable_key": "pk_live_xxxxx", // ← stored plain (not sensitive)\n    "webhook_secret": "whsec_xxxxx"    // ← AES-256 encrypted\n  },\n  "currency": ["usd", "eur", "gbp"],\n  "is_default": true\n}',
      db:[
        {c:'paymentGateways', op:'insert', f:'productId, provider: "stripe", secretKeyEncrypted (AES-256), publishableKey, webhookSecretEncrypted, currency: ["usd"], isDefault: true, isActive: true'}
      ]
    },
    {
      actor:'yocore-api',
      action:'Stripe credentials validate করো — test API call করো',
      detail:'stripe.accounts.retrieve() দিয়ে credentials valid কিনা confirm করো। Invalid হলে error — DB-তে save হয় না।',
      payload:'// Validation call:\nconst acct = await stripe.accounts.retrieve();\n// Success → save encrypted credentials\n// Fail   → "Invalid Stripe credentials" error',
      db:[]
    },
    {
      actor:'super-admin',
      action:'SSLCommerz gateway add করো — Store ID + Password enter করো',
      detail:'SSLCommerz merchant panel থেকে Store ID এবং Store Password নাও। এগুলোও AES-256 encrypt হয়ে store হয়। Currency: BDT শুধু।',
      payload:'{\n  "provider": "sslcommerz",\n  "product_id": "prod_yopm_objectid",\n  "config": {\n    "store_id": "yopm12345",          // ← AES-256 encrypted\n    "store_passwd": "yopm12345pass",  // ← AES-256 encrypted\n    "is_sandbox": false\n  },\n  "currency": ["bdt"],\n  "is_default": false\n}',
      db:[
        {c:'paymentGateways', op:'insert', f:'productId, provider: "sslcommerz", storeIdEncrypted, storePasswdEncrypted, currency: ["bdt"], isDefault: false, isActive: true'}
      ]
    },
    {
      actor:'yocore-api',
      action:'SSLCommerz credentials validate করো — test session call করো',
      detail:'SSLCommerz API-তে ছোট test transaction initiate করে credentials check করো। ৳0 amount দিয়ে test করা যায় sandbox-এ।',
      payload:'// POST to SSLCommerz API:\nPOST https://sandbox.sslcommerz.com/gwprocess/v4/api.php\n{\n  store_id: "yopm12345",\n  store_passwd: "yopm12345pass",\n  total_amount: 10,\n  currency: "BDT",\n  tran_id: "VALIDATION_TEST_" + Date.now(),\n  ...\n}\n// Response status: "SUCCESS" → credentials valid',
      db:[]
    },
    {
      actor:'super-admin',

// ─────────────────────────────────────────────

{

    {

      payload:'const existingUser = await Users.findOne({ email: "newuser@example.com" });\nif (existingUser) {\n  const alreadyMember = await WorkspaceMembers.findOne({\n    workspaceId,\n    userId: existingUser._id,\n    status: "ACTIVE"\n  });\n  if (alreadyMember) throw 409: "User is already a member of this workspace";\n}',

      payload:'const rawToken = crypto.randomBytes(32).toString("hex");\nconst tokenHash = sha256(rawToken); // ← DB-তে hash store\n\nawait Invitations.findOneAndUpdate(\n  { workspaceId, email: "newuser@example.com", status: "PENDING" },\n  {\n    tokenHash,\n    role: "MEMBER",\n    invitedBy: adminUserId,\n    expiresAt: now + 72h,\n    status: "PENDING",\n    isExistingUser: !!existingUser // ← path decision\n  },\n  { upsert: true, new: true }\n);',
      db:[

      payload:'// Existing user email:\n"Hi [name], [Admin] has invited you to [Workspace] on [Product].\n[Accept Invitation] → https://yopm.io/invitations/accept?token=rawToken"\n\n// New user email:\n"You\'ve been invited to [Workspace]. Create your free account to get started.\n[Accept & Create Account] → https://yopm.io/invitations/signup?token=rawToken"',

      payload:'GET https://yopm.io/invitations/accept?token=rawToken\n→ YoPM: POST /v1/invitations/accept { token: rawToken }\n→ YoCore validates: sha256(rawToken) matches DB tokenHash\n→ token expired? → 410 Gone: "Invitation expired. Ask admin to resend."',
      db:[]
    },
    {
      actor:'yocore-api',

      payload:'// Add to workspace:\nawait WorkspaceMembers.create({\n  workspaceId,\n  userId: existingUser._id,\n  roleId: role_member_objectid,\n  addedBy: invitingAdminId,\n  joinedAt: now\n});\n// Ensure productUsers link exists:\nawait ProductUsers.findOneAndUpdate(\n  { userId: existingUser._id, productId },\n  { $setOnInsert: { status: "ACTIVE", joinedAt: now } },\n  { upsert: true }\n);\n// Mark invitation done:\nawait Invitations.updateOne({ _id }, { status: "ACCEPTED", acceptedAt: now });',
      db:[

      db:[
        {c:'invitations', op:'read', f:'tokenHash match → preview data (email, workspace, role)'}
      ]
    },
    {
      actor:'yocore-api',
      action:'[PATH B] Account তৈরি করো + email auto-verify + workspace-এ add করো',

      payload:'// Single atomic operation:\nconst newUser = await Users.create({\n  name, email, passwordHash: argon2id(password),\n  status: "ACTIVE",              // ← email already verified via invitation\n  emailVerified: true,           // ← invitation = implicit trust\n  emailVerifiedAt: now,\n  emailVerifiedMethod: "invitation",\n  onboarded: false               // ← wizard still needed\n});\n\nawait ProductUsers.create({ userId: newUser._id, productId, status: "ACTIVE" });\nawait WorkspaceMembers.create({ userId: newUser._id, workspaceId, roleId, addedBy });\nawait Invitations.updateOne({ _id }, { status: "ACCEPTED", acceptedAt: now });\n// Auto-login: issue access token + refresh token\nreturn { access_token, redirect: "/onboarding" };',
      db:[

// ═══════════════════════════════════════════════
//  RENDER ENGINE
// ═══════════════════════════════════════════════
const OP_CLASS = {insert:'op-insert',update:'op-update',delete:'op-delete',read:'op-read'};
const OP_LABEL = {insert:'INSERT',update:'UPDATE',delete:'DELETE',read:'READ'};

function renderLegend(){
  document.getElementById('legend-rows').innerHTML=Object.entries(ACTORS).map(([,a])=>`
    <div class="legend-row">
      <div class="legend-dot" style="background:${a.color}"></div>
      <div class="legend-label">${a.label}</div>
    </div>`).join('');
}

function renderSidebar(){
  document.getElementById('sidebar-nav').innerHTML=flows.map((f,i)=>`
    <div class="flow-link${i===0?' active':''}" data-id="${f.id}" onclick="showFlow('${f.id}',this)">
      <div class="flow-num-badge">${f.num}</div>
      <div class="fl-text">
        <div class="fl-title">${f.title}</div>
        <div class="fl-sub">${f.subtitle}</div>
      </div>
    </div>`).join('');
}

function renderFlows(){
  document.getElementById('flow-container').innerHTML=flows.map((f,fi)=>{
    const isDanger = f.id==='f08';
    return `
    <div class="flow-page${fi===0?' active':''}" id="${f.id}">
      <div class="flow-label">Flow ${f.num} of ${flows.length} · ${f.subtitle}</div>
      <div class="flow-title">${f.title}</div>
      <div class="flow-desc">${f.desc}</div>

      <div class="actors-row">
        ${f.actors.map(a=>`
          <div class="actor-pill" style="background:${ACTORS[a].bg};border-color:${ACTORS[a].border};color:${ACTORS[a].color}">
            <div style="width:8px;height:8px;border-radius:50%;background:${ACTORS[a].color};flex-shrink:0"></div>
            ${ACTORS[a].label}
          </div>`).join('')}
      </div>

      <div class="steps-wrap">
        ${f.steps.map((s,si)=>{
          const color=ACTOR_COLOR(s.actor);
          const isLast=si===f.steps.length-1;
          const isWarning=s.action.includes('⏰');
          const isDangerStep=s.action.includes('🔥');
          let extraClass='';
          if(isDangerStep) extraClass='danger-step';
          else if(isWarning) extraClass='warning-step';
          return `
          <div class="step${extraClass?' '+extraClass:''}">
            <div class="step-gutter">
              <div class="step-circle" style="border-color:${color};color:${color}">${si+1}</div>
              ${!isLast?`<div class="step-line"></div>`:''}
            </div>
            <div class="step-body"${isLast?' style="padding-bottom:0"':''}>
              <div class="step-card" style="border-left:3px solid ${color}22">
                <div class="step-actor" style="color:${color}">${ACTORS[s.actor]?.label||s.actor}</div>
                <div class="step-action">${s.action}</div>
                ${s.detail?`<div class="step-detail">${s.detail}</div>`:''}
                ${s.payload?`<div class="step-payload">${escHtml(s.payload)}</div>`:''}
                ${s.db&&s.db.length>0?`
                  <div class="db-impact">
                    <div class="db-impact-label">📦 Database Impact</div>
                    ${s.db.map(d=>`
                      <div class="db-row">
                        <span class="db-coll">${d.c}</span>
                        <span class="op ${OP_CLASS[d.op]||'op-read'}">${OP_LABEL[d.op]||d.op.toUpperCase()}</span>
                        <span class="db-fields">${escHtml(d.f)}</span>
                      </div>`).join('')}
                  </div>`:''
                }
              </div>
            </div>
          </div>`;
        }).join('')}
      </div>

      <div class="db-summary">
        <div class="db-summary-title">📋 এই Flow-এ কোন Collections Touched হয়</div>
        <div class="db-grid">
          ${ALL_COLLECTIONS.map(coll=>{
            const h=f.dbHit&&f.dbHit[coll];
            return `
            <div class="db-card${h?' hit':''}">
              <div class="db-card-name">
                <div class="status-dot"></div>${coll}
              </div>
              ${h?`
                <div class="db-card-ops">${h.ops.map(op=>`<span class="op ${OP_CLASS[op]}">${OP_LABEL[op]}</span>`).join('')}</div>
                <div class="db-card-note">${h.note}</div>
              `:`<div class="db-card-note" style="color:#21262d">— unchanged —</div>`}
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>`;
  }).join('');
}

function escHtml(str){
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showFlow(id, el){
  document.querySelectorAll('.flow-page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.flow-link').forEach(l=>l.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  (el||document.querySelector(`.flow-link[data-id="${id}"]`)).classList.add('active');
  document.getElementById('main').scrollTop=0;
}

// keyboard navigation
document.addEventListener('keydown',e=>{
  const current=flows.findIndex(f=>document.getElementById(f.id).classList.contains('active'));
  if(e.key==='ArrowRight'||e.key===']') showFlow(flows[Math.min(current+1,flows.length-1)].id);
  if(e.key==='ArrowLeft' ||e.key==='[') showFlow(flows[Math.max(current-1,0)].id);
});

// init
renderLegend();
renderSidebar();
renderFlows();
</script>
</body>
</html>
