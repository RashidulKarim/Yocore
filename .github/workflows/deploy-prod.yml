name: Deploy — Production

on:
  workflow_dispatch:
    inputs:
      git_sha:
        description: 'Git SHA to deploy (must already be green on main)'
        required: true
        type: string

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  NODE_VERSION: '20.11.0'
  PNPM_VERSION: '9.12.0'
  AWS_REGION: us-east-1
  ECR_REPO: yocore/api
  ECS_CLUSTER: yocore-prod
  ECS_SERVICE: yocore-api-prod

permissions:
  id-token: write
  contents: read

jobs:
  approval:
    name: Manual approval
    runs-on: ubuntu-latest
    environment: production   # GitHub environment with required reviewers configured
    steps:
      - run: echo "Approved by reviewer for sha ${{ inputs.git_sha }}"

  deploy-api:
    name: Deploy API → ECS prod
    needs: [approval]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_sha }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build + push API image
        run: |
          IMAGE=${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO }}:prod-${{ inputs.git_sha }}
          docker build -f apps/api/Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Render new task definition
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: deploy/ecs/prod-task-definition.json
          container-name: api
          image: ${{ env.IMAGE }}

      - name: Deploy ECS service (blue/green)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          cluster: ${{ env.ECS_CLUSTER }}
          service: ${{ env.ECS_SERVICE }}
          wait-for-service-stability: true

  deploy-admin-web:
    name: Deploy admin-web → Vercel prod
    needs: [approval]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_sha }}
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @yocore/admin-web build
      - run: pnpm dlx vercel --prod --token "$VERCEL_TOKEN" --cwd apps/admin-web --confirm
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_ADMIN_WEB_PROJECT_ID }}

  deploy-auth-web:
    name: Deploy auth-web → Vercel prod
    needs: [approval]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_sha }}
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @yocore/auth-web build
      - run: pnpm dlx vercel --prod --token "$VERCEL_TOKEN" --cwd apps/auth-web --confirm
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_AUTH_WEB_PROJECT_ID }}
